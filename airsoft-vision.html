<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Airsoft Vision</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* Splash */
#splash{position:fixed;inset:0;z-index:200;background:#050a05;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;}
#splash.fade{opacity:0;pointer-events:none;}
.sp-ico{font-size:52px;margin-bottom:8px;}
.sp-tit{font-size:22px;font-weight:800;letter-spacing:1px;color:#00e5a0;}
.sp-sub{font-size:10px;color:rgba(0,229,160,.35);letter-spacing:4px;text-transform:uppercase;margin:4px 0 20px;}
.spb{padding:4px 14px;border-radius:18px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:3px 0;}
.spb.g{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:#00e5a0;}
.spb.r{background:rgba(255,59,59,.08);border:1px solid rgba(255,59,59,.25);color:#ff6b6b;}
.spb.y{background:rgba(255,208,60,.08);border:1px solid rgba(255,208,60,.25);color:#ffd03c;}
.spb.gr{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2);color:#94a3b8;}
.sp-yr{font-size:10px;color:rgba(0,229,160,.15);letter-spacing:4px;margin-top:14px;}
.sp-bar{width:150px;height:2px;background:rgba(0,229,160,.1);border-radius:1px;overflow:hidden;margin-top:10px;}
.sp-fill{height:100%;width:0%;background:#00e5a0;transition:width 4s linear;}

/* Header */
#header{padding:10px 14px;background:#000;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
#header h1{font-size:15px;font-weight:800;letter-spacing:1px;color:#00e5a0;}
#status{font-size:12px;color:#555;}

/* Camera */
#container{position:relative;width:100%;flex:1;overflow:hidden;background:#000;}
#video{position:absolute;width:100%;height:100%;object-fit:cover;}
#canvas{position:absolute;width:100%;height:100%;z-index:2;}

/* HUD */
#hud{
  position:absolute;bottom:0;left:0;right:0;z-index:25;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
  padding:28px 16px 12px;
  display:none;flex-direction:column;gap:4px;pointer-events:none;
}
.hud-row{display:flex;justify-content:space-between;align-items:center;}
.hud-stat{font-size:12px;font-family:monospace;}
.hud-stat span{color:rgba(255,255,255,.35);}
.hud-stat b{color:#00e5a0;}
.hud-count{font-size:20px;font-weight:800;color:#fff;}
.hud-count.enemy{color:#ff3b3b;}

/* Crosshair */
#xhair{position:absolute;inset:0;z-index:3;pointer-events:none;display:none;}

/* Team bar — větší a čitelnější */
#teamBar{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:25;display:none;gap:10px;
  background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);
  border-radius:36px;padding:8px 16px;
}
.tbtn{border:none;border-radius:24px;padding:11px 22px;font-size:16px;font-weight:800;cursor:pointer;opacity:.45;transition:opacity .18s;}
.tbtn.red{background:rgba(255,59,59,.3);color:#ff6b6b;border:2px solid rgba(255,59,59,.45);}
.tbtn.blue{background:rgba(56,189,248,.3);color:#38bdf8;border:2px solid rgba(56,189,248,.45);}
.tbtn.sel.red{background:#ff3b3b;color:#fff;opacity:1;}
.tbtn.sel.blue{background:#38bdf8;color:#000;opacity:1;}

/* Zoom bar — větší */
#zoomBar{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  z-index:25;display:none;gap:2px;
  background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);
  border-radius:32px;padding:7px 14px;pointer-events:auto;
}
.zb{background:none;border:none;color:rgba(255,255,255,.55);font-size:16px;font-weight:800;cursor:pointer;padding:9px 14px;border-radius:18px;}
.zb.on{background:rgba(255,255,255,.22);color:#fff;}
.zb:active{transform:scale(.9);}

/* Vision toggle — větší */
#visionBar{
  position:absolute;top:12px;left:12px;
  z-index:25;display:none;gap:6px;flex-wrap:wrap;max-width:200px;
}
.vbtn{background:rgba(0,0,0,.75);border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:15px;font-weight:700;cursor:pointer;padding:10px 13px;border-radius:16px;min-width:50px;text-align:center;}
.vbtn.on{background:rgba(0,229,160,.25);border-color:rgba(0,229,160,.6);color:#00e5a0;}
.vbtn:active{transform:scale(.9);}

/* Tlačítka vpravo dole — větší */
#controls{position:absolute;bottom:18px;right:16px;z-index:25;display:none;flex-direction:column;gap:12px;}
.cbtn{
  background:rgba(0,0,0,.75);border:2px solid rgba(255,255,255,.22);
  border-radius:50%;width:66px;height:66px;font-size:26px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
.cbtn:active{transform:scale(.88);}

/* Record button */
#recBtn{color:#ff3b3b;border-color:rgba(255,59,59,.6);}
#recBtn.rec{background:rgba(255,59,59,.35);border-color:#ff3b3b;animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1}50%{opacity:.5}}
#recTimer{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:26;display:none;align-items:center;gap:8px;
  background:rgba(0,0,0,.8);border:1.5px solid rgba(255,59,59,.5);
  border-radius:26px;padding:7px 18px;
  font-size:16px;font-weight:700;color:#ff4444;font-family:monospace;
}
#recDot{width:10px;height:10px;border-radius:50%;background:#ff3b3b;animation:recpulse 1s infinite;}

/* Loader */
#loader{position:absolute;z-index:30;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:10px;}
.spin{width:36px;height:36px;border:3px solid rgba(0,229,160,.15);border-top-color:#00e5a0;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.spint{font-size:13px;color:#555;text-align:center;}
#pbar{width:180px;height:3px;background:rgba(0,229,160,.1);border-radius:2px;overflow:hidden;}
#pfill{height:100%;background:#00e5a0;width:0%;transition:width .4s;}

#startBtn{position:absolute;z-index:20;top:50%;left:50%;transform:translate(-50%,-50%);background:#00e5a0;color:#000;border:none;border-radius:50px;padding:18px 48px;font-size:20px;font-weight:800;cursor:pointer;display:none;}

#flash{position:absolute;inset:0;z-index:50;background:#fff;pointer-events:none;opacity:0;}
#net{width:100%;padding:6px 16px;text-align:center;font-size:12px;font-weight:600;flex-shrink:0;display:none;}
#net.off{background:#7f1d1d;color:#fca5a5;display:block;}
#net.on{background:#14532d;color:#86efac;display:block;}

@media(orientation:landscape){
  .cbtn{width:54px;height:54px;font-size:22px;}
  .tbtn{padding:8px 16px;font-size:14px;}
  .zb{font-size:13px;padding:7px 11px;}
  #zoomBar{bottom:80px;}
}
</style>
</head>

<script>
// Ověření přístupu — stejná metoda jako index.html
(function(){
  // Transformační konstanty (musí odpovídat index.html)
  const _t='__env_cfg_v1';
  const _u=()=>navigator.userAgent.length.toString(16);
  const _g=()=>{try{return sessionStorage.getItem(_t);}catch(e){return null;}};
  // Validace session tokenu
  const _v=()=>{const s=_g();return s&&s===btoa('ok'+_u());};
  // Přesměrování na login pokud není session
  if(!_v()){
    // Malá prodleva aby se stránka nestihla načíst
    document.documentElement.style.display='none';
    location.replace('index.html');
  }
})();
</script>
<script>
const _cw=console.warn.bind(console);
console.warn=(...a)=>{const s=String(a[0]||'');if(s.includes('already registered')||s.includes('already been set')||s.includes('Reusing'))return;_cw(...a);};

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<!-- face-api pro detekci hlavy -->
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
<script>
// ── DOM ───────────────────────────────────────────────────────────────────
const video    =document.getElementById('video');
const canvas   =document.getElementById('canvas');
const ctx      =canvas.getContext('2d');
const xhairEl  =document.getElementById('xhair');
const xhCtx    =xhairEl.getContext('2d');
const statusEl =document.getElementById('status');
const startBtn =document.getElementById('startBtn');
const camToggle=document.getElementById('camToggle');
const photoBtn =document.getElementById('photoBtn');
const flashEl  =document.getElementById('flash');
const controls =document.getElementById('controls');
const zoomBar  =document.getElementById('zoomBar');
const teamBar  =document.getElementById('teamBar');
const hudEl    =document.getElementById('hud');
const visionBar=document.getElementById('visionBar');
const hudCount =document.getElementById('hudCount');
const hudFrames=document.getElementById('hudFrames');
const hudFps   =document.getElementById('hudFps');
const hudDps   =document.getElementById('hudDps');
const hudSize  =document.getElementById('hudSize');

// ── State ─────────────────────────────────────────────────────────────────
let stream=null, running=false, starting=false, facingMode='environment';
let cocoModel=null, myTeam=null;
const enemies=new Set();

// ── Výkonnostní statistiky ────────────────────────────────────────────────
let totalFrames=0;   // celkový počet vykreslených snímků
let totalDets=0;     // celkový počet detekcí AI
let drawFps=0, detPs=0;
let drawCount=0, detCount=0, statLast=performance.now();

function updateStats(){
  const now=performance.now();
  if(now-statLast>=1000){
    drawFps=drawCount; detPs=detCount;
    drawCount=0; detCount=0; statLast=now;
    hudFps.textContent=drawFps;
    hudDps.textContent=detPs;
  }
}

// ── NMS — sluč duplicitní boxy před trackingem ────────────────────────────
function nms(dets, thresh=0.4){
  if(!dets.length) return dets;
  dets.sort((a,b)=>b.score-a.score);
  const keep=[], used=new Set();
  for(let i=0;i<dets.length;i++){
    if(used.has(i)) continue;
    keep.push(dets[i]);
    for(let j=i+1;j<dets.length;j++){
      if(!used.has(j) && iou(dets[i].bbox,dets[j].bbox)>thresh) used.add(j);
    }
  }
  return keep;
}

// ── Tracker ───────────────────────────────────────────────────────────────
let tracks=[], nextId=1;
const SMOOTH=0.2;
const MAX_MISS=5; // rychlé zmizení po ztrátě

function iou(a,b){
  const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]);
  const x2=Math.min(a[0]+a[2],b[0]+b[2]),y2=Math.min(a[1]+a[3],b[1]+b[3]);
  const i=Math.max(0,x2-x1)*Math.max(0,y2-y1);
  return i/(a[2]*a[3]+b[2]*b[3]-i+1e-5);
}

function updateTracks(rawDets){
  const dets=nms(rawDets, 0.40);
  const matched=new Set();

  for(const d of dets){
    let best=null, bScore=-1;
    const dCx=d.bbox[0]+d.bbox[2]/2, dCy=d.bbox[1]+d.bbox[3]/2;

    for(const t of tracks){
      if(matched.has(t.id)) continue;
      const iouV=iou(d.bbox,[t.x,t.y,t.w,t.h]);
      // Vzdálenost středů — tolerance = 2× velikost boxu (zvládne pohyb kamery)
      const tCx=t.x+t.w/2, tCy=t.y+t.h/2;
      const cd=Math.hypot(dCx-tCx,dCy-tCy);
      const maxD=Math.max(t.w,t.h)*2.0;
      const distScore=Math.max(0,1-cd/maxD)*0.7;
      const score=Math.max(iouV, distScore);
      if(score>0.22 && score>bScore){bScore=score;best=t;}
    }

    if(best){
      // EMA smooth — plynulý pohyb rámečku
      best.x+=(d.bbox[0]-best.x)*SMOOTH;
      best.y+=(d.bbox[1]-best.y)*SMOOTH;
      best.w+=(d.bbox[2]-best.w)*SMOOTH;
      best.h+=(d.bbox[3]-best.h)*SMOOTH;
      best.score=best.score*.4+d.score*.6;
      best.miss=0; best.age++;
      matched.add(best.id);
    }else{
      // Nový track — anti-duplikát
      const dup=tracks.some(t=>iou(d.bbox,[t.x,t.y,t.w,t.h])>0.30);
      if(!dup){
        tracks.push({id:nextId++,
          x:d.bbox[0],y:d.bbox[1],w:d.bbox[2],h:d.bbox[3],
          score:d.score,age:0,miss:0});
      }
    }
  }

  // Zvyš miss counter, bez velocity drift
  for(const t of tracks) if(!matched.has(t.id)) t.miss++;
  tracks=tracks.filter(t=>t.miss<=MAX_MISS);
}

// ── Canvas ────────────────────────────────────────────────────────────────
let cW=0,cH=0;
function maybeResize(){
  const c=document.getElementById('container');
  if(c.offsetWidth!==cW||c.offsetHeight!==cH){
    cW=canvas.width=xhairEl.width=c.offsetWidth;
    cH=canvas.height=xhairEl.height=c.offsetHeight;
  }
}
function getR(){
  const vw=video.videoWidth,vh=video.videoHeight,cw=canvas.width,ch=canvas.height;
  if(!vw||!vh)return{x:0,y:0,sx:1,sy:1};
  const va=vw/vh,ca=cw/ch;
  let dw,dh;
  if(va>ca){dh=ch;dw=ch*va;}else{dw=cw;dh=cw/va;}
  return{x:(cw-dw)/2,y:(ch-dh)/2,sx:dw/vw,sy:dh/vh};
}

// Draw box corners only (fast)
function corners(bx,by,bw,bh,col,lw){
  const l=Math.min(bw,bh)*.2;
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(bx,by+l);   ctx.lineTo(bx,by);   ctx.lineTo(bx+l,by);
  ctx.moveTo(bx+bw-l,by);ctx.lineTo(bx+bw,by);ctx.lineTo(bx+bw,by+l);
  ctx.moveTo(bx+bw,by+bh-l);ctx.lineTo(bx+bw,by+bh);ctx.lineTo(bx+bw-l,by+bh);
  ctx.moveTo(bx+l,by+bh);ctx.lineTo(bx,by+bh);ctx.lineTo(bx,by+bh-l);
  ctx.stroke();
}

function pill(t,bx,by,bg,fg){
  ctx.font='bold 14px system-ui,sans-serif';
  const tw=ctx.measureText(t).width+12;
  ctx.fillStyle=bg; ctx.fillRect(bx,by-21,tw,19);
  ctx.fillStyle=fg||'#fff'; ctx.fillText(t,bx+6,by-6);
}
function pillB(t,bx,by,bg,fg){
  ctx.font='bold 13px system-ui,sans-serif';
  const tw=ctx.measureText(t).width+12;
  ctx.fillStyle=bg; ctx.fillRect(bx,by+3,tw,18);
  ctx.fillStyle=fg||'#fff'; ctx.fillText(t,bx+6,by+16);
}

// Vzdálenost
function dist(h,sy){
  const cm=(170*700)/(h*sy);
  if(cm<80) return{t:Math.round(cm)+'cm',c:'#ff4444'};
  if(cm<400)return{t:(Math.round(cm/10)/10).toFixed(1)+'m',c:'#ffd03c'};
  return    {t:Math.round(cm/100)+'0m+',c:'#00e5a0'};
}

// Tým
function bStyle(id){
  if(myTeam===null) return{col:'#00e5a0',glow:'rgba(0,229,160,.12)',lbl:'🎯'};
  if(enemies.has(id)) return{col:'#ff3b3b',glow:'rgba(255,59,59,.2)',lbl:'🔴 NEPŘÍTEL'};
  return{col:'#00e5a0',glow:'rgba(0,229,160,.1)',lbl:'🟢 SPOJENEC'};
}

// Tap = označit nepřítele
canvas.addEventListener('click',e=>{
  if(!myTeam)return;
  const rect=canvas.getBoundingClientRect();
  const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
  const r=getR();
  for(const t of tracks){
    const bx=r.x+t.x*r.sx,by=r.y+t.y*r.sy,bw=t.w*r.sx,bh=t.h*r.sy;
    if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){
      enemies.has(t.id)?enemies.delete(t.id):enemies.add(t.id);
      return;
    }
  }
});

// ── Zaměřovací kříž ───────────────────────────────────────────────────────
function drawXhair(){
  xhCtx.clearRect(0,0,xhairEl.width,xhairEl.height);
  const w=xhairEl.width,h=xhairEl.height,cx=w/2,cy=h/2;
  const col='rgba(0,229,160,.8)',fad='rgba(0,229,160,.18)';
  const arm=24,gap=9;

  // ROI zóna — kde aktivně hledá lidi (65% středu snímku)
  const roiW2=w*0.65, roiH2=h*0.65;
  xhCtx.strokeStyle='rgba(0,229,160,.07)';
  xhCtx.lineWidth=1; xhCtx.setLineDash([2,8]);
  xhCtx.strokeRect(cx-roiW2/2,cy-roiH2/2,roiW2,roiH2);
  xhCtx.setLineDash([]);
  xhCtx.font='8px system-ui'; xhCtx.fillStyle='rgba(0,229,160,.2)';
  xhCtx.fillText('SCAN ZONE',cx-roiW2/2+4,cy-roiH2/2+10);

  // Kříž
  xhCtx.strokeStyle=col; xhCtx.lineWidth=1.5; xhCtx.lineCap='round';
  xhCtx.beginPath();
  xhCtx.moveTo(cx-arm-gap,cy);xhCtx.lineTo(cx-gap,cy);
  xhCtx.moveTo(cx+gap,cy);    xhCtx.lineTo(cx+arm+gap,cy);
  xhCtx.moveTo(cx,cy-arm-gap);xhCtx.lineTo(cx,cy-gap);
  xhCtx.moveTo(cx,cy+gap);    xhCtx.lineTo(cx,cy+arm+gap);
  xhCtx.stroke();

  // Dot
  xhCtx.fillStyle=col;
  xhCtx.beginPath();xhCtx.arc(cx,cy,2,0,Math.PI*2);xhCtx.fill();

  // Range rings s popisky
  const rings=[{r:.07,l:'10m'},{r:.13,l:'30m'},{r:.22,l:'50m'},{r:.34,l:'100m'}];
  for(const rg of rings){
    const rad=Math.min(w,h)*rg.r;
    xhCtx.strokeStyle=fad; xhCtx.lineWidth=1;
    xhCtx.setLineDash([3,7]);
    xhCtx.beginPath();xhCtx.arc(cx,cy,rad,0,Math.PI*2);xhCtx.stroke();
    xhCtx.setLineDash([]);
    xhCtx.font='9px system-ui';xhCtx.fillStyle='rgba(0,229,160,.3)';
    xhCtx.fillText(rg.l,cx+rad+3,cy-2);
  }

  // Rohové závorky
  const fw=Math.min(w,h)*.38,corner=14;
  const fx=cx-fw/2,fy=cy-fw/2;
  xhCtx.strokeStyle='rgba(0,229,160,.25)';xhCtx.lineWidth=1.5;
  xhCtx.beginPath();
  xhCtx.moveTo(fx,fy+corner);xhCtx.lineTo(fx,fy);xhCtx.lineTo(fx+corner,fy);
  xhCtx.moveTo(fx+fw-corner,fy);xhCtx.lineTo(fx+fw,fy);xhCtx.lineTo(fx+fw,fy+corner);
  xhCtx.moveTo(fx+fw,fy+fw-corner);xhCtx.lineTo(fx+fw,fy+fw);xhCtx.lineTo(fx+fw-corner,fy+fw);
  xhCtx.moveTo(fx+corner,fy+fw);xhCtx.lineTo(fx,fy+fw);xhCtx.lineTo(fx,fy+fw-corner);
  xhCtx.stroke();
}

// ── Draw loop — 60fps čisté kreslení ──────────────────────────────────────
let xhairDrawn=false;
function drawLoop(){
  if(!running)return;
  maybeResize();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const r=getR();
  const vis=tracks.filter(t=>t.age>=1||t.miss===0);

  let enemyCount=0, friendCount=0;

  for(const t of vis){
    const bx=r.x+t.x*r.sx, by=r.y+t.y*r.sy;
    const bw=t.w*r.sx,      bh=t.h*r.sy;
    const pct=Math.round(t.score*100);
    const bs=bStyle(t.id);
    const isE=enemies.has(t.id);
    if(isE)enemyCount++; else if(myTeam)friendCount++;

    // Průhlednost klesá jen mírně při ztrátě
    const alpha=t.miss===0?1:Math.max(0.5,1-t.miss/MAX_MISS);
    ctx.globalAlpha=alpha;

    // Glow
    ctx.strokeStyle=bs.glow; ctx.lineWidth=8; ctx.strokeRect(bx,by,bw,bh);
    // Box
    ctx.strokeStyle=bs.col; ctx.lineWidth=isE?3:2;
    ctx.strokeRect(bx,by,bw,bh);
    // Corners
    corners(bx,by,bw,bh,bs.col,isE?3.5:2.5);
    // Label
    pill(bs.lbl+' '+pct+'%',bx,by,isE?'rgba(170,0,0,.85)':'rgba(0,75,45,.85)');
    // Distance
    const d=dist(t.h,r.sy);
    pillB('📏 '+d.t,bx,by+bh,'rgba(0,0,0,.7)',d.c);

    // Tap hint
    if(myTeam){
      ctx.font='8px system-ui';ctx.fillStyle='rgba(255,255,255,.2)';
      ctx.fillText('tap',bx+bw-18,by+8);
    }
  }

  // Reset alpha
  ctx.globalAlpha=1;

  // Crosshair (jednou, pak jen při resize)
  if(!xhairDrawn||cW!==xhairEl.width){drawXhair();xhairDrawn=true;}

  // Stats
  drawCount++; totalFrames++;
  hudFrames.textContent=totalFrames;
  updateStats();

  // HUD count
  if(vis.length===0){
    hudCount.textContent='Žádná detekce';
    hudCount.className='hud-count';
  }else if(myTeam&&enemyCount>0){
    hudCount.textContent=enemyCount+(enemyCount===1?' NEPŘÍTEL':' NEPŘÁTELÉ');
    hudCount.className='hud-count enemy';
  }else{
    hudCount.textContent=vis.length+(vis.length===1?' osoba':vis.length<5?' osoby':' osob');
    hudCount.className='hud-count';
  }

  requestAnimationFrame(drawLoop);
}

// ── Detection loop ────────────────────────────────────────────────────────
const detBuf =document.createElement('canvas');
const detCtx =detBuf.getContext('2d');
const roiBuf =document.createElement('canvas');
const roiCtx =roiBuf.getContext('2d');
let detBusy=false, detCycle=0;

function getInputSize(){
  const z=parseFloat(document.querySelector('.zb.on')?.dataset.z||1);
  // Větší vstup = lepší detekce na dálku, ale pomalejší
  // Na 100m+ potřebujeme aspoň 320px
  if(z>=4) return 416; // iPhone 11 Pro 4× zoom = ~100m+
  if(z>=2) return 320;
  return 224; // blízko = rychlé
}

async function detLoop(){
  while(running){
    if(!detBusy && cocoModel && video.readyState>=2){
      detBusy=true;
      try{
        detCycle++;
        const W=getInputSize();
        const allDets=[];
        const isNight=visionMode==='nvg'||visionMode==='thermo'||visionMode==='bw';

        // ── ROI 60% středu — každý cyklus ────────────────────────────
        const rf=0.60;
        const roiX=video.videoWidth*(1-rf)/2;
        const roiY=video.videoHeight*(1-rf)/2;
        const roiW=video.videoWidth*rf;
        const roiH=video.videoHeight*rf;
        roiBuf.width=W; roiBuf.height=Math.round(W*(roiH/roiW));
        if(isNight) roiCtx.filter='contrast(2) brightness(1.3)';
        roiCtx.drawImage(video,roiX,roiY,roiW,roiH,0,0,roiBuf.width,roiBuf.height);
        roiCtx.filter='none';
        const t1=isNight?0.18:0.28;
        const rawRoi=await cocoModel.detect(roiBuf,6,t1);
        const sxR=roiW/roiBuf.width, syR=roiH/roiBuf.height;
        for(const o of rawRoi){
          if(o.class!=='person') continue;
          const bh=o.bbox[3]*syR;
          if(bh<video.videoHeight*0.025) continue;
          allDets.push({bbox:[o.bbox[0]*sxR+roiX,o.bbox[1]*syR+roiY,o.bbox[2]*sxR,bh],score:o.score});
        }

        // ── Celý snímek — každý 4. cyklus ────────────────────────────
        if(detCycle%4===0){
          const H=Math.round(W*(video.videoHeight/video.videoWidth));
          detBuf.width=W; detBuf.height=H;
          if(isNight) detCtx.filter='contrast(2) brightness(1.3)';
          detCtx.drawImage(video,0,0,W,H);
          detCtx.filter='none';
          const t2=isNight?0.20:0.30;
          const rawFull=await cocoModel.detect(detBuf,6,t2);
          const sx=video.videoWidth/W, sy=video.videoHeight/H;
          for(const o of rawFull){
            if(o.class!=='person') continue;
            const bh=o.bbox[3]*sy;
            if(bh<video.videoHeight*0.025) continue;
            allDets.push({bbox:[o.bbox[0]*sx,o.bbox[1]*sy,o.bbox[2]*sx,bh],score:o.score});
          }
        }

        // ── Hlava (face-api) — každý 3. cyklus ───────────────────────
        if(detCycle%3===0){
          try{
            const fOpts=new faceapi.TinyFaceDetectorOptions({inputSize:224,scoreThreshold:isNight?0.18:0.25});
            const faces=await faceapi.detectAllFaces(video,fOpts);
            for(const f of faces){
              const {x,y,width:fw,height:fh}=f.box;
              const bH=fh*6.5, bW=bH*0.4;
              allDets.push({bbox:[x+fw/2-bW/2,y,bW,bH],score:f.score*0.8});
            }
          }catch(e){}
        }

        // ── Termální blobová detekce — jen v thermo módu ─────────────
        if(visionMode==='thermo'){
          try{
            const tBlobs=detectThermalBlobs();
            for(const tb of tBlobs) allDets.push(tb);
          }catch(e){}
        }

        // Agresivní NMS = jeden box na osobu
        updateTracks(nms(allDets, 0.35));
        detCount++; totalDets++;
        hudSize.textContent=W+'px';
      }catch(e){}
      detBusy=false;
    }
    await new Promise(r=>requestAnimationFrame(r));
  }
}

// ── Model ──────────────────────────────────────────────────────────────────
async function loadModels(){
  try{
    document.getElementById('ltxt').textContent='Načítám detektor osob...';
    document.getElementById('pfill').style.width='30%';

      document.getElementById('loader').style.display='none';
      statusEl.textContent='Připraveno ✓';

}

// ── Kamera ────────────────────────────────────────────────────────────────
async function startCamera(){
  if(starting)return; starting=true;
  running=false;
  await new Promise(r=>setTimeout(r,60));
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  video.srcObject=null;
  startBtn.style.display='none';
  statusEl.textContent='Spouštím...';
  try{
    // A21: nižší rozlišení = plynulejší video stream
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode,width:{ideal:960},height:{ideal:540}},audio:false
    });
    video.srcObject=stream;
    await new Promise((res,rej)=>{
      const to=setTimeout(()=>rej(new Error('Timeout')),8000);
      video.onloadedmetadata=()=>{clearTimeout(to);res();};
      video.onerror=e=>{clearTimeout(to);rej(e);};
    });
    try{await video.play();}catch(e){await new Promise(r=>setTimeout(r,200));await video.play();}

    controls.style.display='flex';
    zoomBar.style.display='flex';
    teamBar.style.display='flex';
    hudEl.style.display='flex';
    visionBar.style.display='flex';
    xhairEl.style.display='block';

    statusEl.textContent='Hledám...';
    tracks=[]; totalFrames=0; totalDets=0;
    running=true; starting=false;

    requestAnimationFrame(drawLoop); // 60fps kreslení
    detLoop();                        // async detekce

  }catch(e){
    starting=false; running=false;
    statusEl.textContent='⚠️ Kamera selhala';
    startBtn.style.display='block';
  }
}

// ── Vision modes ─────────────────────────────────────────────────────────
let visionMode='normal';
const VFILTERS={
  normal:'',
  // B/W — vysoký kontrast, siluety vyniknou
  bw:    'grayscale(1) contrast(2) brightness(1.15)',
  // NVG — zelené zesílení jako noční vidění, zesvětlí tmavé plochy
  nvg:   'grayscale(1) brightness(3) contrast(1.6) sepia(1) hue-rotate(82deg) saturate(8)',
  // Thermo — teplé = bílé/žluté, studené = modré/fialové
  // contrast(3) = vyniknou teplotní rozdíly, saturate(10) = intenzivní barvy
  thermo:'contrast(3) saturate(10) hue-rotate(200deg) brightness(0.9)',
};
document.querySelectorAll('.vbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.vbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    visionMode=b.dataset.m;
    video.style.filter=VFILTERS[visionMode]||'';
  });
});

// ── Termální detekce — hledá teplé (červené/bílé) oblasti v termo módu ───
const thermoBuf=document.createElement('canvas');
const thermoCtx2=thermoBuf.getContext('2d',{willReadFrequently:true});

function detectThermalBlobs(){
  const W=96, H=Math.round(96*(video.videoHeight/video.videoWidth));
  thermoBuf.width=W; thermoBuf.height=H;
  // Nakresli s termo filtrem
  thermoCtx2.filter=VFILTERS.thermo;
  thermoCtx2.drawImage(video,0,0,W,H);
  thermoCtx2.filter='none';
  const d=thermoCtx2.getImageData(0,0,W,H).data;

  // Mřížka 8×6 buněk
  const gW=8,gH=6;
  const cW=W/gW, cH=H/gH;
  const hot=[];
  for(let gy=0;gy<gH;gy++){
    for(let gx=0;gx<gW;gx++){
      let hp=0,tp=0;
      for(let y=Math.round(gy*cH);y<Math.round((gy+1)*cH);y++){
        for(let x=Math.round(gx*cW);x<Math.round((gx+1)*cW);x++){
          const i=(y*W+x)*4;
          // Teplý pixel: hodně červené, málo modré (iron paleta)
          if(d[i]>160&&d[i+2]<90) hp++;
          tp++;
        }
      }
      if(hp/tp>0.3) hot.push({gx,gy,heat:hp/tp});
    }
  }

  // BFS — spoj sousedy do blobů
  const used=new Set(), blobs=[];
  for(const c of hot){
    const k=`${c.gx},${c.gy}`;
    if(used.has(k))continue;
    const blob=[c]; used.add(k);
    const q=[c];
    while(q.length){
      const n=q.shift();
      for(const nb of hot){
        const nk=`${nb.gx},${nb.gy}`;
        if(!used.has(nk)&&Math.abs(nb.gx-n.gx)<=1&&Math.abs(nb.gy-n.gy)<=1){
          blob.push(nb);used.add(nk);q.push(nb);
        }
      }
    }
    if(blob.length>=2) blobs.push(blob);
  }

  const sxT=video.videoWidth/W, syT=video.videoHeight/H;
  return blobs.map(blob=>{
    const x0=Math.min(...blob.map(c=>c.gx))*cW*sxT;
    const y0=Math.min(...blob.map(c=>c.gy))*cH*syT;
    const x1=(Math.max(...blob.map(c=>c.gx))+1)*cW*sxT;
    const y1=(Math.max(...blob.map(c=>c.gy))+1)*cH*syT;
    const bw=x1-x0, bh=y1-y0;
    const heat=blob.reduce((s,c)=>s+c.heat,0)/blob.length;
    return {bbox:[x0,y0,bw,bh],score:Math.min(0.9,heat*2.5)};
  }).filter(d=>{
    const bh=d.bbox[3];
    return bh>video.videoHeight*0.04 && bh<video.videoHeight*0.85 && d.bbox[2]/bh<2.5;
  });
}

// ── Zoom ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.zb').forEach(b=>{
  b.addEventListener('click',async()=>{
    const z=parseFloat(b.dataset.z);
    document.querySelectorAll('.zb').forEach(x=>x.classList.toggle('on',x===b));
    if(!stream)return;
    const tr=stream.getVideoTracks()[0];if(!tr)return;
    try{
      const c=tr.getCapabilities?tr.getCapabilities():{};
      if(c.zoom){
        const mn=c.zoom.min||1,mx=c.zoom.max||10;
        await tr.applyConstraints({advanced:[{zoom:mn+(z-1)*(mx-mn)/9}]});
      }else throw '';
    }catch(e){video.style.transform=`scale(${z})`;video.style.transformOrigin='center';}
  });
});

// ── Team ──────────────────────────────────────────────────────────────────
function selTeam(t){
  if(myTeam===t){
    myTeam=null;enemies.clear();
    document.getElementById('btnRed').classList.remove('sel');
    document.getElementById('btnBlue').classList.remove('sel');
  }else{
    myTeam=t;enemies.clear();
    document.getElementById('btnRed').classList.toggle('sel',t==='red');
    document.getElementById('btnBlue').classList.toggle('sel',t==='blue');
  }
}
document.getElementById('btnRed').addEventListener('click',()=>selTeam('red'));
document.getElementById('btnBlue').addEventListener('click',()=>selTeam('blue'));

// ── Nahrávání ─────────────────────────────────────────────────────────────
const recBtn   =document.getElementById('recBtn');
const recTimer =document.getElementById('recTimer');
const recTimeEl=document.getElementById('recTime');
let mediaRec=null, recChunks=[], recSec=0, recInt=null;

function startRec(){
  if(!stream)return;
  const fps=24;
  const rc=document.createElement('canvas');
  rc.width=video.videoWidth||960; rc.height=video.videoHeight||540;
  const rctx=rc.getContext('2d');
  const compInt=setInterval(()=>{
    if(!running){clearInterval(compInt);return;}
    rctx.drawImage(video,0,0,rc.width,rc.height);
    rctx.drawImage(canvas,0,0,rc.width,rc.height);
  },1000/fps);
  const mime=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4']
    .find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
  mediaRec=new MediaRecorder(rc.captureStream(fps),{mimeType:mime,videoBitsPerSecond:2500000});
  recChunks=[];
  mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  mediaRec.onstop=()=>{
    clearInterval(compInt);
    const blob=new Blob(recChunks,{type:mime});
    const a=document.createElement('a');
    a.download='airsoft-'+Date.now()+'.'+(mime.includes('mp4')?'mp4':'webm');
    a.href=URL.createObjectURL(blob); a.click();
    URL.revokeObjectURL(a.href);
  };
  mediaRec.start(500);
  recSec=0; recTimeEl.textContent='00:00';
  recTimer.style.display='flex';
  recBtn.classList.add('rec'); recBtn.textContent='⏹';
  recInt=setInterval(()=>{
    recSec++;
    const m=String(Math.floor(recSec/60)).padStart(2,'0');
    const s=String(recSec%60).padStart(2,'0');
    recTimeEl.textContent=m+':'+s;
  },1000);
}

function stopRec(){
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  clearInterval(recInt);
  recTimer.style.display='none';
  recBtn.classList.remove('rec'); recBtn.textContent='⏺';
}

recBtn.addEventListener('click',()=>recBtn.classList.contains('rec')?stopRec():startRec());
