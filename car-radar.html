<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Car Radar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root{--g:#00ff88;--gd:rgba(0,255,136,.12);--gg:rgba(0,255,136,.45);--r:#ff3b3b;--y:#ffd060;--bg:#020a04;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;background:var(--bg);
  font-family:'Share Tech Mono',monospace;color:var(--g);overflow:hidden;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);
}
#video{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;}

#hdr{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:10px 18px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(0,255,136,.13);background:rgba(2,10,4,.96);
}
#hdr-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--g);text-shadow:0 0 14px var(--gg);}
#hdr-r{text-align:right;}
#hdr-mode{font-size:9px;color:rgba(0,255,136,.38);letter-spacing:2px;}
#hdr-count{font-size:15px;font-weight:700;color:var(--g);}

#wrap{position:fixed;top:46px;left:0;right:0;bottom:130px;display:flex;align-items:center;justify-content:center;}
#rc{display:block;}

#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:6px 12px 14px;min-height:122px;
  background:linear-gradient(transparent,rgba(2,10,4,.98) 28%);
}
#pt{font-size:9px;letter-spacing:3px;color:rgba(0,255,136,.28);margin-bottom:6px;}
#cars{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
#cars::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;background:rgba(0,16,6,.92);border:1px solid rgba(0,255,136,.16);
  border-radius:10px;padding:8px 12px;min-width:96px;
  display:flex;flex-direction:column;gap:3px;align-items:center;
  transition:border-color .3s,box-shadow .3s;
}
.chip.near{border-color:rgba(255,59,59,.55);box-shadow:0 0 10px rgba(255,59,59,.18);}
.chip.med {border-color:rgba(255,208,60,.45);box-shadow:0 0 8px rgba(255,208,60,.12);}
.ci{font-size:22px;}
.ct{font-size:12px;font-weight:700;color:var(--g);letter-spacing:.5px;}
.cd{font-size:11px;color:rgba(0,255,136,.45);}
.cdir{font-size:10px;color:rgba(0,255,136,.28);}

#loader{
  position:fixed;inset:0;z-index:50;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.li{font-size:54px;animation:blink 1.3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.25;transform:scale(.92);}50%{opacity:1;transform:scale(1.06);}}
.ln{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:5px;color:var(--g);text-shadow:0 0 22px var(--gg);}
.ls{font-size:10px;color:rgba(0,255,136,.32);letter-spacing:3px;}
.lb{width:200px;height:2px;background:rgba(0,255,136,.1);border-radius:1px;overflow:hidden;}
.lf{height:100%;background:var(--g);width:0%;transition:width .5s;box-shadow:0 0 8px var(--gg);}
.lt{font-size:11px;color:rgba(0,255,136,.38);letter-spacing:2px;}
#sBtn{
  background:transparent;border:2px solid var(--g);color:var(--g);
  border-radius:6px;padding:14px 42px;font-family:'Orbitron',monospace;
  font-size:14px;font-weight:700;letter-spacing:3px;cursor:pointer;
  box-shadow:0 0 22px rgba(0,255,136,.28);display:none;transition:all .2s;
}
#sBtn:active{background:var(--gd);transform:scale(.97);}
#net{position:fixed;top:46px;left:0;right:0;z-index:20;padding:4px;text-align:center;font-size:10px;font-weight:700;letter-spacing:2px;display:none;}
#net.off{background:rgba(127,29,29,.85);color:#fca5a5;display:block;}
#net.on {background:rgba(20,83,45,.85);color:#86efac;display:block;}
</style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<div id="net"></div>
<div id="hdr">
  <div id="hdr-title">📡 CAR RADAR</div>
  <div id="hdr-r">
    <div id="hdr-mode">STANDBY</div>
    <div id="hdr-count">0 vozidel</div>
  </div>
</div>
<div id="wrap"><canvas id="rc"></canvas></div>
<div id="panel">
  <div id="pt">DETEKOVANÁ VOZIDLA</div>
  <div id="cars"></div>
</div>
<div id="loader">
  <div class="li">📡</div>
  <div class="ln">CAR RADAR</div>
  <div class="ls">INICIALIZACE SYSTÉMU</div>
  <div class="lb"><div class="lf" id="lf"></div></div>
  <div class="lt" id="lt">ČEKÁM...</div>
  <button id="sBtn">▶ SPUSTIT RADAR</button>
</div>

<script>
const _cw=console.warn.bind(console);
console.warn=(...a)=>{const s=String(a[0]||'');if(s.includes('already registered')||s.includes('already been set')||s.includes('Reusing'))return;_cw(...a);};
</script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
<script>
const video=document.getElementById('video');
const rc=document.getElementById('rc');
const ctx=rc.getContext('2d');
const carsEl=document.getElementById('cars');
const sBtn=document.getElementById('sBtn');
const lf=document.getElementById('lf');
const lt=document.getElementById('lt');
const hdrMode=document.getElementById('hdr-mode');
const hdrCount=document.getElementById('hdr-count');

let cocoModel=null,mnModel=null,stream=null,running=false;
let vehicles=[],nextId=1,sweep=0;

const VCLS=['car','truck','bus','motorcycle','bicycle','train','boat','airplane'];
const VICO={car:'🚗',truck:'🚛',bus:'🚌',motorcycle:'🏍',bicycle:'🚲',train:'🚂',boat:'⛵',airplane:'✈️'};
const VCS ={car:'Auto',truck:'Náklaďák',bus:'Autobus',motorcycle:'Motorka',bicycle:'Kolo',train:'Vlak',boat:'Loď',airplane:'Letadlo'};
const MN=[
  ['sports car','🏎️','Sporťák'],['race car','🏎️','Závoďák'],['convertible','🚗','Kabriolet'],
  ['jeep','🚙','Jeep'],['pickup truck','🛻','Pickup'],['minivan','🚐','Minivan'],
  ['ambulance','🚑','Sanitka'],['fire engine','🚒','Hasiči'],['police car','🚓','Policie'],
  ['taxi','🚕','Taxi'],['limousine','🚗','Limuzína'],['school bus','🚌','Škol. bus'],
  ['trailer truck','🚚','Kamion'],['tow truck','🚗','Odtahovka'],
  ['sedan','🚗','Sedan'],['suv','🚙','SUV'],['coupe','🚗','Kupé'],
  ['wagon','🚗','Kombi'],['hatchback','🚗','Hatchback'],
];

// MobileNet klasifikace
const cb=document.createElement('canvas');
const cc=cb.getContext('2d');
cb.width=cb.height=224;
const mnC=new Map();
async function classifyCar(bbox){
  if(!mnModel)return null;
  const[x,y,w,h]=bbox;if(w<40||h<30)return null;
  const key=`${Math.round(x/40)},${Math.round(y/40)}`;
  if(mnC.has(key))return mnC.get(key);
  try{
    cc.drawImage(video,x,y,w,h,0,0,224,224);
    const ps=await mnModel.classify(cb,5);
    for(const p of ps){
      const lc=p.className.toLowerCase();
      for(const[kw,ico,cs]of MN){
        if(lc.includes(kw)&&p.probability>0.1){
          const r={ico,cs,pct:Math.round(p.probability*100)};
          mnC.set(key,r);if(mnC.size>40)mnC.delete(mnC.keys().next().value);
          return r;
        }
      }
    }
  }catch(e){}
  return null;
}

function estDist(bh){
  const cm=(150*700)/Math.max(bh,1);
  if(cm<150) return{t:Math.round(cm)+'cm',v:cm,col:'#ff3b3b'};
  if(cm<1000)return{t:Math.round(cm/100*10)/10+'m',v:cm,col:'#ffd060'};
  return{t:Math.round(cm/100)+'0m+',v:cm,col:'#00ff88'};
}
function estAngle(bx,bw){return((bx+bw/2)/video.videoWidth-0.5)*110;}
function dirLabel(a){
  if(a<-35)return'◀ Vlevo';if(a<-12)return'↖ L-vpřed';
  if(a<12) return'↑ Přímo'; if(a<35) return'↗ P-vpřed';
  return'▶ Vpravo';
}

function iou(a,b){
  const x1=Math.max(a[0],b[0]),y1=Math.max(a[1],b[1]);
  const x2=Math.min(a[0]+a[2],b[0]+b[2]),y2=Math.min(a[1]+a[3],b[1]+b[3]);
  const i=Math.max(0,x2-x1)*Math.max(0,y2-y1);
  return i/(a[2]*a[3]+b[2]*b[3]-i+1e-5);
}

function updateV(dets){
  const m=new Set();
  for(const d of dets){
    let best=null,bv=0.2;
    for(const v of vehicles){
      if(m.has(v.id))continue;
      const s=iou(d.bbox,[v.x,v.y,v.w,v.h]);
      if(s>bv){bv=s;best=v;}
    }
    const S=0.25;
    if(best){
      best.x+=(d.bbox[0]-best.x)*S;best.y+=(d.bbox[1]-best.y)*S;
      best.w+=(d.bbox[2]-best.w)*S;best.h+=(d.bbox[3]-best.h)*S;
      best.score=best.score*.5+d.score*.5;
      best.dist=estDist(d.bbox[3]);
      best.angle=estAngle(d.bbox[0],d.bbox[2]);
      best.dir=dirLabel(best.angle);
      best.class=d.class;best.miss=0;best.age++;
      if(best.age%6===0)classifyCar(d.bbox).then(mn=>{if(mn)best.mn=mn;});
      m.add(best.id);
    }else{
      const dup=vehicles.some(v=>iou(d.bbox,[v.x,v.y,v.w,v.h])>0.3);
      if(!dup){
        const nv={id:nextId++,x:d.bbox[0],y:d.bbox[1],w:d.bbox[2],h:d.bbox[3],
          score:d.score,class:d.class,miss:0,age:0,mn:null,
          dist:estDist(d.bbox[3]),angle:estAngle(d.bbox[0],d.bbox[2])};
        nv.dir=dirLabel(nv.angle);
        vehicles.push(nv);
        classifyCar(d.bbox).then(mn=>{if(mn)nv.mn=mn;});
      }
    }
  }
  for(const v of vehicles)if(!m.has(v.id))v.miss++;
  vehicles=vehicles.filter(v=>v.miss<=8);
}

// Radar size
function sizeR(){
  const w=document.getElementById('wrap');
  const s=Math.min(w.offsetWidth,w.offsetHeight)-6;
  rc.width=rc.height=s;
}

// Draw radar
function drawR(){
  const s=rc.width;if(!s)return;
  const cx=s/2,cy=s/2,R=s/2-3;
  ctx.clearRect(0,0,s,s);

  // BG
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle='rgba(0,7,3,.97)';ctx.fill();

  // Rings
  [.25,.5,.75,1].forEach((f,i)=>{
    ctx.strokeStyle=`rgba(0,255,136,${0.05+i*.04})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy,R*f,0,Math.PI*2);ctx.stroke();
  });
  ctx.fillStyle='rgba(0,255,136,.22)';ctx.font='10px Share Tech Mono,monospace';
  [['10m',.25],['20m',.5],['40m',.75]].forEach(([l,f])=>ctx.fillText(l,cx+R*f+4,cy-3));

  // Cross
  ctx.strokeStyle='rgba(0,255,136,.07)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.stroke();
  [45,135].forEach(d=>{
    const r=d*Math.PI/180;ctx.strokeStyle='rgba(0,255,136,.04)';
    ctx.beginPath();ctx.moveTo(cx-Math.cos(r)*R,cy-Math.sin(r)*R);ctx.lineTo(cx+Math.cos(r)*R,cy+Math.sin(r)*R);ctx.stroke();
  });

  // Sweep
  sweep=(sweep+1.6)%360;
  const sr=sweep*Math.PI/180;
  ctx.save();
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,sr-.55,sr);ctx.closePath();
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  g.addColorStop(0,'rgba(0,255,136,0)');g.addColorStop(.6,'rgba(0,255,136,.04)');g.addColorStop(1,'rgba(0,255,136,.18)');
  ctx.fillStyle=g;ctx.fill();ctx.restore();
  ctx.strokeStyle='rgba(0,255,136,.7)';ctx.lineWidth=1.5;
  ctx.shadowColor='#00ff88';ctx.shadowBlur=7;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(sr)*R,cy+Math.sin(sr)*R);ctx.stroke();
  ctx.shadowBlur=0;

  // Vehicles
  const maxCm=4000;
  for(const v of vehicles){
    if(v.miss>3)continue;
    const d=v.dist||{v:3000,col:'#00ff88'};
    const rr=Math.min(R*.9,(d.v/maxCm)*R*.9);
    const ar=(v.angle-90)*Math.PI/180;
    const px=cx+Math.cos(ar)*rr,py=cy+Math.sin(ar)*rr;
    const col=d.col,dr=d.v<200?7:d.v<800?5:4;

    // Pulse ring for close vehicles
    if(d.v<200){
      ctx.strokeStyle='rgba(255,59,59,.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(px,py,dr+4+Math.sin(Date.now()*.005)*3,0,Math.PI*2);ctx.stroke();
    }

    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=d.v<200?14:7;
    ctx.beginPath();ctx.arc(px,py,dr,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;

    const ico=v.mn?.ico||(VICO[v.class]||'🚗');
    const lbl=v.mn?.cs||(VCS[v.class]||'Auto');
    ctx.font=`${d.v<600?13:11}px Rajdhani,system-ui,sans-serif`;
    ctx.fillStyle=col;ctx.fillText(ico+' '+lbl,px+dr+4,py-2);
    ctx.font='10px Share Tech Mono,monospace';
    ctx.fillStyle='rgba(0,255,136,.4)';ctx.fillText(d.t,px+dr+4,py+10);
  }

  // You
  ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=14;
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.font='8px Share Tech Mono,monospace';ctx.fillStyle='rgba(0,255,136,.45)';ctx.fillText('YOU',cx+8,cy+4);

  // Border
  ctx.strokeStyle='rgba(0,255,136,.28)';ctx.lineWidth=2;
  ctx.shadowColor='rgba(0,255,136,.3)';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
}

function updateChips(){
  const vis=vehicles.filter(v=>v.miss<=3).sort((a,b)=>(a.dist?.v||9999)-(b.dist?.v||9999));
  carsEl.innerHTML='';
  vis.forEach(v=>{
    const near=v.dist?.v<200,med=v.dist?.v<800;
    const c=document.createElement('div');
    c.className='chip'+(near?' near':med?' med':'');
    c.innerHTML=`
      <div class="ci">${v.mn?.ico||VICO[v.class]||'🚗'}</div>
      <div class="ct">${v.mn?.cs||VCS[v.class]||'Auto'}</div>
      <div class="cd" style="color:${v.dist?.col||'var(--g)'}">${v.dist?.t||'?'}</div>
      <div class="cdir">${v.dir||'—'}</div>`;
    carsEl.appendChild(c);
  });
  hdrCount.textContent=vis.length+' vozidel';
}

let lastD=0;
function drawLoop(ts){
  if(!running)return;
  if(ts-lastD>=33){lastD=ts;drawR();updateChips();}
  requestAnimationFrame(drawLoop);
}

const db=document.createElement('canvas');
const dc=db.getContext('2d');
let busy=false,tick=0;
async function detLoop(){
  while(running){
    if(!busy&&cocoModel&&video.readyState>=2){
      busy=true;tick++;
      try{
        const W=480,H=Math.round(480*(video.videoHeight/video.videoWidth));
        db.width=W;db.height=H;dc.drawImage(video,0,0,W,H);
        const raw=await cocoModel.detect(db,25,0.22);
        const sx=video.videoWidth/W,sy=video.videoHeight/H;
        const dets=raw.filter(o=>VCLS.includes(o.class)).map(o=>({
          bbox:[o.bbox[0]*sx,o.bbox[1]*sy,o.bbox[2]*sx,o.bbox[3]*sy],
          score:o.score,class:o.class
        }));
        updateV(dets);
        hdrMode.textContent=`SCAN #${tick} · ${dets.length} det.`;
      }catch(e){}
      busy=false;
    }
    await new Promise(r=>setTimeout(r,150));
  }
}

async function loadModels(){
  try{
    lt.textContent='COCO DETEKTOR...';lf.style.width='25%';
    cocoModel=await cocoSsd.load({base:'lite_mobilenet_v2'});
    lf.style.width='62%';lt.textContent='KLASIFIKÁTOR AUT...';
    mnModel=await mobilenet.load({version:2,alpha:1.0});
    lf.style.width='100%';lt.textContent='PŘIPRAVENO ✓';
    setTimeout(()=>{sBtn.style.display='block';},300);
  }catch(e){lt.textContent='CHYBA: '+e.message;}
}

async function startRadar(){
  sBtn.style.display='none';lt.textContent='SPOUŠTÍM KAMERU...';
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    video.srcObject=stream;
    await new Promise((res,rej)=>{
      const to=setTimeout(()=>rej(new Error('Timeout')),8000);
      video.onloadedmetadata=()=>{clearTimeout(to);res();};
    });
    await video.play();
    document.getElementById('loader').style.display='none';
    sizeR();vehicles=[];running=true;
    requestAnimationFrame(drawLoop);
    detLoop();
  }catch(e){
    lt.textContent='KAMERA SELHALA';sBtn.style.display='block';
  }
}

sBtn.addEventListener('click',startRadar);
window.addEventListener('resize',sizeR);

const netEl=document.getElementById('net');
function updNet(){
  if(navigator.onLine){netEl.className='on';netEl.textContent='◉ ONLINE';setTimeout(()=>{netEl.style.display='none';},2000);}
  else{netEl.className='off';netEl.textContent='◉ OFFLINE';}
}
window.addEventListener('online',updNet);window.addEventListener('offline',updNet);updNet();
loadModels();
</script>
</body>
</html>
