<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Detekce obličeje</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  #header {
    width: 100%;
    padding: 14px 20px 10px;
    text-align: center;
    z-index: 10;
    flex-shrink: 0;
  }
  #header h1 { font-size: 17px; font-weight: 600; }
  #status { font-size: 12px; color: #aaa; margin-top: 4px; min-height: 16px; }
  #container {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #video {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #canvas {
    position: absolute;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }
  #startBtn {
    position: absolute;
    z-index: 20;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: none;
  }
  #startBtn:active { transform: scale(0.96); }
  #camToggle {
    position: absolute;
    bottom: 24px; right: 20px;
    z-index: 20;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 24px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  #fpsLabel {
    position: absolute;
    top: 10px; left: 12px;
    z-index: 20;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    display: none;
  }
  #faceCount {
    position: absolute;
    top: 10px; right: 12px;
    z-index: 20;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    display: none;
  }
  #loader {
    position: absolute;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { font-size: 13px; color: #aaa; }
</style>
</head>
<body>
<div id="header">
  <h1>&#128248; Detekce obličeje</h1>
  <div id="status">Načítám AI model...</div>
</div>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="loader">
    <div class="spinner"></div>
    <div class="spinner-text">Načítám model...</div>
  </div>
  <button id="startBtn">Zapnout kameru</button>
  <div id="camToggle">&#8635;</div>
  <div id="fpsLabel">0 fps</div>
  <div id="faceCount"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
<script>
  const video       = document.getElementById('video');
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const statusEl    = document.getElementById('status');
  const startBtn    = document.getElementById('startBtn');
  const camToggle   = document.getElementById('camToggle');
  const fpsLabel    = document.getElementById('fpsLabel');
  const faceCountEl = document.getElementById('faceCount');
  const loader      = document.getElementById('loader');

  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';

  let facingMode = 'user';
  let stream = null;
  let running = false;
  let lastTime = 0;
  let frameCount = 0;
  let fps = 0;

  async function loadModel() {
    try {
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      statusEl.textContent = 'Model připraven ✓';
      loader.style.display = 'none';
      startBtn.style.display = 'block';
    } catch(e) {
      loader.style.display = 'none';
      statusEl.textContent = 'Chyba modelu: ' + e.message;
      console.error(e);
    }
  }

  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    running = false;
    startBtn.style.display = 'none';
    statusEl.textContent = 'Spouštím kameru...';
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await new Promise(r => { video.onloadedmetadata = r; });
      video.play();
      camToggle.style.display = 'flex';
      fpsLabel.style.display = 'block';
      faceCountEl.style.display = 'block';
      statusEl.textContent = 'Hledám obličeje...';
      running = true;
      detect();
    } catch(e) {
      statusEl.textContent = 'Přístup ke kameře zamítnut';
      startBtn.style.display = 'block';
    }
  }

  function resizeCanvas() {
    const c = document.getElementById('container');
    canvas.width  = c.offsetWidth;
    canvas.height = c.offsetHeight;
  }

  function getVideoRect() {
    const vw = video.videoWidth, vh = video.videoHeight;
    const cw = canvas.width,    ch = canvas.height;
    if (!vw || !vh) return { x:0, y:0, sx:1, sy:1 };
    const va = vw/vh, ca = cw/ch;
    let dw, dh;
    if (va > ca) { dh = ch; dw = ch * va; }
    else         { dw = cw; dh = cw / va; }
    return { x:(cw-dw)/2, y:(ch-dh)/2, sx:dw/vw, sy:dh/vh };
  }

  function drawCorners(x, y, w, h, len) {
    ctx.beginPath();
    ctx.moveTo(x, y+len);     ctx.lineTo(x, y);     ctx.lineTo(x+len, y);
    ctx.moveTo(x+w-len, y);   ctx.lineTo(x+w, y);   ctx.lineTo(x+w, y+len);
    ctx.moveTo(x+w, y+h-len); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w-len, y+h);
    ctx.moveTo(x+len, y+h);   ctx.lineTo(x, y+h);   ctx.lineTo(x, y+h-len);
    ctx.stroke();
  }

  async function detect() {
    if (!running) return;
    resizeCanvas();

    if (video.readyState >= 2) {
      const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.4 });
      const detections = await faceapi.detectAllFaces(video, opts);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const r = getVideoRect();

      for (const det of detections) {
        const { x, y, width: w, height: h } = det.box;
        const score = det.score;

        const bx = r.x + x * r.sx;
        const by = r.y + y * r.sy;
        const bw = w * r.sx;
        const bh = h * r.sy;

        const gv  = Math.round(180 + 75 * score);
        const rv  = Math.round(255 * (1 - score));
        const col = 'rgb(' + rv + ',' + gv + ',80)';

        ctx.strokeStyle = col;
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, by, bw, bh);

        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 3;
        drawCorners(bx, by, bw, bh, Math.min(bw, bh) * 0.16);

        const label = Math.round(score * 100) + '%';
        ctx.font = 'bold 13px system-ui, sans-serif';
        const tw = ctx.measureText(label).width + 12;
        ctx.fillStyle = col;
        ctx.fillRect(bx, by - 22, tw, 20);
        ctx.fillStyle = '#000';
        ctx.fillText(label, bx + 6, by - 7);
      }

      const n = detections.length;
      faceCountEl.textContent = n === 0 ? '' : n === 1 ? '1 obličej' : n + ' obličeje';

      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fps = frameCount; frameCount = 0; lastTime = now;
        fpsLabel.textContent = fps + ' fps';
      }
    }

    requestAnimationFrame(detect);
  }

  startBtn.addEventListener('click', startCamera);
  camToggle.addEventListener('click', () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });
  window.addEventListener('resize', resizeCanvas);

  loadModel();
</script>
</body>
</html>
