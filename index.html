<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Detekce obličeje</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  #header {
    width: 100%;
    padding: 14px 20px 10px;
    text-align: center;
    z-index: 10;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #status {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
    min-height: 16px;
  }
  #container {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
  }
  #startBtn {
    position: absolute;
    z-index: 20;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  #startBtn:active { transform: scale(0.96); }
  #camToggle {
    position: absolute;
    bottom: 24px;
    right: 20px;
    z-index: 20;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 22px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
    backdrop-filter: blur(6px);
  }
  #fpsLabel {
    position: absolute;
    top: 10px;
    left: 12px;
    z-index: 20;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    display: none;
  }
  #faceCount {
    position: absolute;
    top: 10px;
    right: 12px;
    z-index: 20;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    display: none;
  }
</style>
</head>
<body>
<div id="header">
  <h1>&#128248; Detekce obličeje</h1>
  <div id="status">Načítám AI model...</div>
</div>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <button id="startBtn" style="display:none">Zapnout kameru</button>
  <div id="camToggle">&#128257;</div>
  <div id="fpsLabel">0 fps</div>
  <div id="faceCount"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.1.0/dist/blazeface.min.js"></script>
<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('startBtn');
  const camToggle = document.getElementById('camToggle');
  const fpsLabel = document.getElementById('fpsLabel');
  const faceCountEl = document.getElementById('faceCount');

  let model = null;
  let animFrame = null;
  let facingMode = 'user';
  let stream = null;
  let lastTime = 0;
  let frameCount = 0;
  let fps = 0;

  async function loadModel() {
    try {
      statusEl.textContent = 'Načítám AI model... 🧠';
      model = await blazeface.load();
      statusEl.textContent = 'Model připraven ✓';
      startBtn.style.display = 'block';
    } catch(e) {
      statusEl.textContent = 'Chyba načítání modelu: ' + e.message;
    }
  }

  async function startCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      video.play();
      startBtn.style.display = 'none';
      camToggle.style.display = 'flex';
      fpsLabel.style.display = 'block';
      faceCountEl.style.display = 'block';
      statusEl.textContent = 'Hledám obličeje...';
      detect();
    } catch(e) {
      statusEl.textContent = '⚠️ Přístup ke kameře zamítnut';
      startBtn.style.display = 'block';
    }
  }

  function resizeCanvas() {
    const container = document.getElementById('container');
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;
  }

  function getVideoRect() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cw = canvas.width;
    const ch = canvas.height;
    if (!vw || !vh) return { x: 0, y: 0, w: cw, h: ch, scaleX: 1, scaleY: 1 };
    const videoAspect = vw / vh;
    const canvasAspect = cw / ch;
    let drawW, drawH, drawX, drawY;
    if (videoAspect > canvasAspect) {
      drawH = ch;
      drawW = ch * videoAspect;
    } else {
      drawW = cw;
      drawH = cw / videoAspect;
    }
    drawX = (cw - drawW) / 2;
    drawY = (ch - drawH) / 2;
    return { x: drawX, y: drawY, w: drawW, h: drawH, scaleX: drawW / vw, scaleY: drawH / vh };
  }

  async function detect() {
    resizeCanvas();
    if (!model || video.readyState < 2) {
      animFrame = requestAnimationFrame(detect);
      return;
    }

    const predictions = await model.estimateFaces(video, false);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const rect = getVideoRect();

    for (const pred of predictions) {
      const [x1, y1] = pred.topLeft;
      const [x2, y2] = pred.bottomRight;
      const confidence = pred.probability[0];

      const bx = rect.x + x1 * rect.scaleX;
      const by = rect.y + y1 * rect.scaleY;
      const bw = (x2 - x1) * rect.scaleX;
      const bh = (y2 - y1) * rect.scaleY;

      const alpha = Math.min(1, confidence * 1.2);
      const r = Math.round(255 * (1 - confidence));
      const g = Math.round(220 * confidence);
      const color = `rgba(${r}, ${g}, 60, ${alpha})`;

      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.strokeRect(bx, by, bw, bh);

      const cornerLen = Math.min(bw, bh) * 0.18;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      drawCorners(bx, by, bw, bh, cornerLen);

      const label = Math.round(confidence * 100) + '%';
      ctx.fillStyle = color;
      ctx.fillRect(bx, by - 22, label.length * 8 + 10, 20);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px system-ui, sans-serif';
      ctx.fillText(label, bx + 5, by - 7);

      if (pred.landmarks) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        for (const pt of pred.landmarks) {
          const px = rect.x + pt[0] * rect.scaleX;
          const py = rect.y + pt[1] * rect.scaleY;
          ctx.beginPath();
          ctx.arc(px, py, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    frameCount++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
      fps = frameCount;
      frameCount = 0;
      lastTime = now;
      fpsLabel.textContent = fps + ' fps';
    }

    const n = predictions.length;
    faceCountEl.textContent = n === 0 ? '' : n === 1 ? '1 obličej' : n + ' obličeje';

    animFrame = requestAnimationFrame(detect);
  }

  function drawCorners(x, y, w, h, len) {
    ctx.beginPath();
    ctx.moveTo(x, y + len); ctx.lineTo(x, y); ctx.lineTo(x + len, y);
    ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len);
    ctx.moveTo(x + w, y + h - len); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - len, y + h);
    ctx.moveTo(x + len, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - len);
    ctx.stroke();
  }

  startBtn.addEventListener('click', startCamera);

  camToggle.addEventListener('click', () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    if (animFrame) cancelAnimationFrame(animFrame);
    startCamera();
  });

  window.addEventListener('resize', resizeCanvas);

  loadModel();
</script>
</body>
</html>
